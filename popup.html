<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Reject</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Header with mascot -->
    <div class="header">
      <div class="logo">
        <img src="icons/icon128.png" alt="Cookie Reject" width="32" height="32" style="border-radius: 6px;">
      </div>
      <div class="title-group">
        <h1>Cookie Reject</h1>
        <p class="subtitle">Auto-reject cookie banners</p>
      </div>
    </div>

    <!-- Toggle -->
    <div class="toggle-section">
      <div class="status-row">
        <div class="status-indicator" id="statusDot"></div>
        <span class="status-text" id="statusText">Active</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- Info -->
    <div class="info-section">
      <div class="info-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        <span>Rejects cookies automatically</span>
      </div>
      <div class="info-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v4l3 3" />
        </svg>
        <span>Hides banners instantly</span>
      </div>
      <div class="info-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        <span>No tracking, no data collected</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>v1.0 · Works on all websites</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
