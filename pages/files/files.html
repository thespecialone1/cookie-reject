<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Files - Cookie Reject</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="files.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Files</h1>
        </div>

        <div class="toolbar">
            <div class="toolbar-left">
                <input type="checkbox" id="selectAll" class="checkbox">
                <span class="selected-count" id="selectedCount">(0 Selected)</span>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-secondary" id="btnDownloadSelected" disabled>Download</button>
                <button class="btn btn-danger" id="btnDeleteSelected" disabled>Delete</button>
            </div>
        </div>

        <div class="files-list" id="filesList">
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <p>No screenshots saved yet.</p>
                <span class="empty-sub">Take a screenshot using the extension to see it here.</span>
            </div>
            <!-- Items will be injected here by JS -->
        </div>
    </div>

    <script src="../../src/lib/db.js"></script>
    <script src="files.js"></script>
</body>

</html>
